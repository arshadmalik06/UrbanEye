<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanEye - Report Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand mb-0 h1">UrbanEye</a>
            <div class="navbar-auth-area" id="navbarAuthArea">
            </div>
        </div>
    </nav>
    <div class="modal fade auth-modal" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="authModalLabel">Welcome to UrbanEye</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="auth-tabs">
                        <button class="auth-tab-btn active" data-tab="register" type="button">Register</button>
                        <button class="auth-tab-btn" data-tab="login" type="button">Login</button>
                    </div>
                    <div id="authMsg" class="auth-msg"></div>
                    <div class="auth-tab-pane active" id="paneRegister">
                        <form id="registerForm" autocomplete="off">
                            <div class="mb-3">
                                <label class="form-label" for="regName">Full Name</label>
                                <input type="text" class="form-control" id="regName" placeholder="Steve" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="regEmail">Email</label>
                                <input type="email" class="form-control" id="regEmail"
                                    placeholder="goldenapples@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="regPhone">Phone</label>
                                <input type="tel" class="form-control" id="regPhone" placeholder="+91 9876543210"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="regPassword">Password</label>
                                <input type="password" class="form-control" id="regPassword"
                                    placeholder="Min 6 characters" required minlength="6">
                            </div>
                            <input type="hidden" id="regRole" value="citizen">
                            <button type="submit" class="auth-submit-btn" id="regSubmitBtn">Create Account</button>
                        </form>
                        <div class="auth-divider">or</div>
                        <p class="text-center text-muted" style="font-size:0.85rem;">Already have an account?
                            <a href="#" class="auth-switch-link" data-tab="login"
                                style="color:#0f3460;font-weight:600;">Log in</a>
                        </p>
                    </div>
                    <div class="auth-tab-pane" id="paneLogin">
                        <form id="loginForm" autocomplete="off">
                            <div class="mb-3">
                                <label class="form-label" for="loginEmail">Email</label>
                                <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="loginPassword">Password</label>
                                <input type="password" class="form-control" id="loginPassword"
                                    placeholder="Your password" required>
                            </div>
                            <button type="submit" class="auth-submit-btn" id="loginSubmitBtn">Log In</button>
                        </form>
                        <div class="auth-divider">or</div>
                        <p class="text-center text-muted" style="font-size:0.85rem;">Don't have an account?
                            <a href="#" class="auth-switch-link" data-tab="register"
                                style="color:#a7733c;font-weight:600;">Register</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div class="form-container">
            <h3>Report an Issue</h3>
            <p class="text-muted">Help us keep the city clean and safe.</p>

            <form id="reportForm">
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="category" required>
                        <option value="">Select an issue...</option>
                        <option value="pothole">Pothole / Road Damage</option>
                        <option value="garbage">Illegal Dumping / Garbage</option>
                        <option value="streetlight">Broken Streetlight</option>
                        <option value="water">Water Leakage</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="description" rows="3" placeholder="Briefly describe the issue..."
                        required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <button type="button" id="getLocationBtn" class="btn btn-secondary w-100 mb-2">Use My Current
                        Location</button>
                    <small id="locationStatus" class="form-text text-success d-none">Location captured
                        successfully!</small>
                    <input type="hidden" id="latitude">
                    <input type="hidden" id="longitude">
                </div>

                <div class="mb-3">
                    <label class="form-label">Photo (Optional)</label>
                    <input class="form-control" type="file" id="photo" accept="image/*">
                </div>

                <button type="submit" class="btn btn-primary w-100">Submit Report</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=2"></script>
</body>

</html>
